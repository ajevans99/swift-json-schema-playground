# =============================================================================
# Size report (PR-only)
# -----------------------------------------------------------------------------
# Builds the same artifacts as the deploy workflow (Swift→Wasm validator and
# the Vite bundle) on every pull request and posts a sticky comment showing
# raw + gzip sizes. Also emits `dist/.size-report.json` as a build artifact —
# groundwork for a future README badge that pulls from a Pages-hosted JSON.
#
# Steps are duplicated (rather than refactored) from `deploy.yml` on purpose:
# the deploy job is the prod path and we don't want size-reporting changes to
# accidentally regress its behavior. Keep the SwiftWasm-toolchain steps in
# this file in sync with `deploy.yml` if you bump the Swift version.
#
# Trigger choice: `pull_request` (NOT `pull_request_target`). We don't need
# secrets for the comment — the default `GITHUB_TOKEN` with the explicit
# `pull-requests: write` permission below is sufficient and safer.
# =============================================================================

name: Size report

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: size-report-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Sibling Swift package that wasm/Package.swift depends on via a relative
  # path. Edit if your fork lives elsewhere.
  VALIDATOR_REPO: ajevans99/swift-json-schema
  VALIDATOR_REF: main

  # Must match wasm/build.sh.
  SWIFT_VERSION: "6.3.1"

  # SwiftWasm SDK pinned to the same release/checksum as wasm/build.sh.
  WASM_SDK_URL: "https://download.swift.org/swift-6.3.1-release/wasm-sdk/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE_wasm.artifactbundle.tar.gz"
  WASM_SDK_CHECKSUM: "bd47baa20771f366d8beed7970afaa30742b2210097afd15f85427226d8f4cf2"

  SWIFTLY_HOME_DIR: /home/runner/.swiftly
  SWIFTLY_BIN_DIR: /home/runner/.swiftly/bin

jobs:
  size-report:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout playground
        uses: actions/checkout@v4
        with:
          path: playground

      - name: Checkout swift-json-schema (sibling repo for wasm/Package.swift path dep)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.VALIDATOR_REPO }}
          ref: ${{ env.VALIDATOR_REF }}
          path: swift-json-schema

      - name: Verify sibling layout
        run: |
          set -euxo pipefail
          ls -la
          test -f swift-json-schema/Package.swift
          test -f playground/wasm/Package.swift
          test -x playground/wasm/build.sh

      # ---- Swift toolchain (via swiftly) ----------------------------------
      - name: Install Swift system dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev binaryen

      - name: Cache swiftly toolchain
        id: cache-swiftly
        uses: actions/cache@v4
        with:
          # `swiftly init` lives under ~/.swiftly but the actual toolchain
          # is unpacked to ~/.local/share/swiftly/toolchains — caching only
          # the former leaves a half-install (swiftly+env.sh restored, but
          # `swift` itself missing). Cache both. Key is workflow-scoped to
          # avoid sharing a (potentially incomplete) cache entry with the
          # deploy workflow.
          path: |
            /home/runner/.swiftly
            /home/runner/.local/share/swiftly
          key: swiftly-size-report-${{ runner.os }}-${{ runner.arch }}-${{ env.SWIFT_VERSION }}-v1

      - name: Install swiftly + Swift ${{ env.SWIFT_VERSION }}
        if: steps.cache-swiftly.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          curl -fsSLO "https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz"
          tar zxf "swiftly-$(uname -m).tar.gz"
          ./swiftly init --quiet-shell-followup --assume-yes --skip-install
          # shellcheck disable=SC1091
          . "${SWIFTLY_HOME_DIR}/env.sh"
          swiftly install --use "${SWIFT_VERSION}"

      - name: Put swift on PATH for subsequent steps
        run: |
          set -euxo pipefail
          echo "${SWIFTLY_BIN_DIR}" >> "$GITHUB_PATH"
          # shellcheck disable=SC1091
          . "${SWIFTLY_HOME_DIR}/env.sh"
          swift --version

      # ---- Swift WebAssembly SDK ------------------------------------------
      - name: Cache SwiftWasm SDK
        id: cache-wasm-sdk
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.swiftpm/swift-sdks
            /home/runner/.config/swiftpm/swift-sdks
          key: swift-wasm-sdk-${{ runner.os }}-${{ runner.arch }}-${{ env.SWIFT_VERSION }}-${{ env.WASM_SDK_CHECKSUM }}

      - name: Install SwiftWasm SDK
        if: steps.cache-wasm-sdk.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          # shellcheck disable=SC1091
          . "${SWIFTLY_HOME_DIR}/env.sh"
          swift sdk install "${WASM_SDK_URL}" --checksum "${WASM_SDK_CHECKSUM}"
          swift sdk list

      # ---- Build the WASM validator ---------------------------------------
      - name: Build WASM (wasm/build.sh)
        working-directory: playground/wasm
        run: |
          set -euxo pipefail
          ./build.sh
          ls -lh ../public/validator.wasm

      # ---- Build the Vite site --------------------------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Install npm deps
        working-directory: playground
        run: npm ci

      - name: Build site
        working-directory: playground
        run: npm run build

      # ---- Compute sizes --------------------------------------------------
      #
      # We measure four buckets and report both raw and gzip-9 bytes:
      #
      #   * `validator.wasm` (only one file, but reported separately because
      #     it dominates the total payload)
      #   * `dist/assets/*.js` aggregated
      #   * `dist/assets/*.css` aggregated
      #
      # gzip -9 is what GitHub Pages effectively serves (it transparently
      # gzip-encodes responses for compressible types), so it's a much closer
      # proxy for what users actually download than raw size.
      - name: Compute size report
        id: sizes
        working-directory: playground
        run: |
          set -euo pipefail

          measure_total () {
            # $1 = glob (already shell-expanded by caller via `eval`).
            # Sums raw bytes of every matching file. Returns 0 if no match.
            local total=0
            for f in $1; do
              [ -f "$f" ] || continue
              local sz
              sz=$(wc -c < "$f")
              total=$(( total + sz ))
            done
            echo "$total"
          }

          measure_total_gzip () {
            # Concatenates all matching files and pipes through `gzip -9`.
            # This slightly understates real-world cost (each file is
            # gzip-encoded independently when served), but it's a stable
            # upper bound on the savings and consistent across runs.
            local total=0
            for f in $1; do
              [ -f "$f" ] || continue
              local sz
              sz=$(gzip -9 -c "$f" | wc -c)
              total=$(( total + sz ))
            done
            echo "$total"
          }

          WASM_RAW=$(wc -c < public/validator.wasm)
          WASM_GZ=$(gzip -9 -c public/validator.wasm | wc -c)

          JS_RAW=$(measure_total "dist/assets/*.js")
          JS_GZ=$(measure_total_gzip "dist/assets/*.js")

          CSS_RAW=$(measure_total "dist/assets/*.css")
          CSS_GZ=$(measure_total_gzip "dist/assets/*.css")

          # Trim accidental whitespace from `wc -c`.
          WASM_RAW=$(echo "$WASM_RAW" | tr -d ' ')
          WASM_GZ=$(echo "$WASM_GZ" | tr -d ' ')
          JS_RAW=$(echo "$JS_RAW" | tr -d ' ')
          JS_GZ=$(echo "$JS_GZ" | tr -d ' ')
          CSS_RAW=$(echo "$CSS_RAW" | tr -d ' ')
          CSS_GZ=$(echo "$CSS_GZ" | tr -d ' ')

          echo "wasm_raw=$WASM_RAW"   >> "$GITHUB_OUTPUT"
          echo "wasm_gz=$WASM_GZ"     >> "$GITHUB_OUTPUT"
          echo "js_raw=$JS_RAW"       >> "$GITHUB_OUTPUT"
          echo "js_gz=$JS_GZ"         >> "$GITHUB_OUTPUT"
          echo "css_raw=$CSS_RAW"     >> "$GITHUB_OUTPUT"
          echo "css_gz=$CSS_GZ"       >> "$GITHUB_OUTPUT"

          # ---- JSON report (groundwork for a future README size badge) ----
          # `schemaVersion: 1` + `label`/`message` is the shape shields.io's
          # `endpoint` badge expects, so a future commit can simply point a
          # badge at a Pages-hosted copy of this file.
          mkdir -p dist
          cat > dist/.size-report.json <<JSON
          {
            "schemaVersion": 1,
            "label": "validator.wasm (gz)",
            "message": "$(awk -v b="$WASM_GZ" 'BEGIN { printf "%.1f MiB", b / 1024 / 1024 }')",
            "color": "blue",
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.event.pull_request.head.sha || github.sha }}",
            "sizes": {
              "validatorWasm": { "raw": $WASM_RAW, "gzip": $WASM_GZ },
              "distJs":        { "raw": $JS_RAW,   "gzip": $JS_GZ },
              "distCss":       { "raw": $CSS_RAW,  "gzip": $CSS_GZ }
            }
          }
          JSON

          cat dist/.size-report.json

      - name: Upload size report JSON
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: playground/dist/.size-report.json
          if-no-files-found: error

      # ---- Render the markdown table --------------------------------------
      - name: Render comment body
        id: comment
        env:
          WASM_RAW: ${{ steps.sizes.outputs.wasm_raw }}
          WASM_GZ:  ${{ steps.sizes.outputs.wasm_gz }}
          JS_RAW:   ${{ steps.sizes.outputs.js_raw }}
          JS_GZ:    ${{ steps.sizes.outputs.js_gz }}
          CSS_RAW:  ${{ steps.sizes.outputs.css_raw }}
          CSS_GZ:   ${{ steps.sizes.outputs.css_gz }}
        run: |
          set -euo pipefail

          # MiB for big artifacts, KiB for small ones — auto-pick threshold
          # at 512 KiB so e.g. CSS doesn't show as "0.0 MiB".
          fmt () {
            awk -v b="$1" 'BEGIN {
              if (b >= 512 * 1024) printf "%.1f MiB", b / 1024 / 1024;
              else                 printf "%.1f KiB", b / 1024;
            }'
          }

          {
            echo "### 📦 Bundle size report"
            echo ""
            echo "| Asset            | Size       | Gzipped    |"
            echo "| ---------------- | ---------- | ---------- |"
            printf "| validator.wasm   | %-10s | %-10s |\n" "$(fmt "$WASM_RAW")" "$(fmt "$WASM_GZ")"
            printf "| dist JS (total)  | %-10s | %-10s |\n" "$(fmt "$JS_RAW")"   "$(fmt "$JS_GZ")"
            printf "| dist CSS (total) | %-10s | %-10s |\n" "$(fmt "$CSS_RAW")"  "$(fmt "$CSS_GZ")"
            echo ""
            echo "<sub>Built from \`${{ github.event.pull_request.head.sha || github.sha }}\`. ‘Gzipped’ is \`gzip -9\` of each file (close to what GitHub Pages serves).</sub>"
          } > size-comment.md

          cat size-comment.md

      # ---- Post / update sticky PR comment --------------------------------
      # `marocchino/sticky-pull-request-comment` finds an existing comment
      # carrying the same `header` and edits it in place, so successive
      # pushes to the PR don't spam the conversation.
      - name: Post sticky size comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: size-report
          path: size-comment.md
